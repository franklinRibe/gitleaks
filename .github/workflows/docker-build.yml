name: Docker Build with Gitleaks

on:
  push:
    branches:
      - developer
      - preprod
      - main
  pull_request:
    branches:
      - developer
      - preprod
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks against git history
        id: gitleaks
        continue-on-error: true
        uses: zricethezav/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ARGS: --log-opts="--all"

      - name: Fail pipeline when secrets are found
        if: steps.gitleaks.outcome != 'success'
        run: |
          echo "::error title=Gitleaks detected secrets::Potential secrets were found in the repository history. Download the artifact uploaded by the Gitleaks action to inspect the findings and identify what must be fixed in the code."
          exit 1

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: gitleaks-scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t gitleaks-api:${{ github.sha }} .
